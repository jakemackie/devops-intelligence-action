name: DevOps Intelligence PR Review

on:
  workflow_call:
    secrets:
      OPENAI_API_KEY:
        required: true

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout action repo (contains AI script)
        uses: actions/checkout@v4
        with:
          repository: jakemackie/devops-intelligence-action
          path: action-repo

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Node deps (caller repo)
        run: |
          npm init -y
          npm install node-fetch

      - name: Install OpenAI SDK (action repo)
        working-directory: action-repo
        run: npm install openai

      - name: Setup PHP with coverage
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          coverage: xdebug

      - name: Install WPCS
        run: |
          composer global config --no-plugins allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global require "squizlabs/php_codesniffer:^3.13"
          composer global require "wp-coding-standards/wpcs:^3.0"
          phpcs --config-set installed_paths ~/.composer/vendor/wp-coding-standards/wpcs

      - name: Get PR diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }} > pr.diff

      - name: Run AI review
        run: node action-repo/scripts/ai-review.js
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Generate AI PHPUnit tests
        run: node action-repo/scripts/generate-tests.js
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Ensure phpunit.xml exists
        run: |
          if [ ! -f phpunit.xml ]; then
            printf '%s\n' \
            '<?xml version="1.0" encoding="UTF-8"?>' \
            '<phpunit bootstrap="vendor/autoload.php"' \
            '        colors="true"' \
            '        verbose="true"' \
            '        cacheDirectory=".phpunit.cache">' \
            '' \
            '  <testsuites>' \
            '    <testsuite name="AI Generated Tests">' \
            '      <directory>./tests/Generated</directory>' \
            '    </testsuite>' \
            '  </testsuites>' \
            '' \
            '  <coverage>' \
            '    <report>' \
            '      <text outputFile="php://stdout"/>' \
            '    </report>' \
            '  </coverage>' \
            '' \
            '  <source>' \
            '    <include>' \
            '      <directory suffix=".php">.</directory>' \
            '    </include>' \
            '    <exclude>' \
            '      <directory>./vendor</directory>' \
            '      <directory>./tests</directory>' \
            '    </exclude>' \
            '  </source>' \
            '' \
            '</phpunit>' > phpunit.xml
          fi

      - name: Install PHPUnit
        run: composer require --dev phpunit/phpunit --with-all-dependencies

      - name: Run PHPUnit with coverage (Clover)
        run: |
          XDEBUG_MODE=coverage ./vendor/bin/phpunit \
            --coverage-clover=coverage.xml \
            --coverage-text > test-results.txt || true

      - name: Save generated tests for comment
        run: |
          if [ -f tests/Generated/AIGeneratedTest.php ]; then
            cp tests/Generated/AIGeneratedTest.php generated-test.txt
          else
            echo "No AI generated test file found." > generated-test.txt
          fi

      - name: Install XML parser
        working-directory: action-repo
        run: npm install fast-xml-parser

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('review.txt', 'utf8');
            const tests = fs.readFileSync('generated-test.txt', 'utf8');
            const testResults = fs.readFileSync('test-results.txt', 'utf8');

            let coverage = 'N/A';

            try {
              const xml = fs.readFileSync('coverage.xml', 'utf8');

            // match common Clover attribute formats
            const matches = [
              xml.match(/statementpercent="([\d.]+)"/),
              xml.match(/statements-covered="(\d+)".*?statements="(\d+)"/),
              xml.match(/<metrics[\s\S]*?statements[\s\S]*?coveredstatements="(\d+)"/)
            ];

            // try first valid match
            for (const m of matches) {
              if (m) {
                coverage = (m[1] ?? m[0]).toString() + '%';
                break;
              }
            }

            } catch (e) {
              coverage = 'N/A';
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body:
                '### AI Code Review\n' + review +
                '\n---\n### Tests Generated\n```php\n' + tests +
                '\n```\n---\n### Test Results\n```\n' + testResults +
                '\n```\n---\n### Coverage\n' + coverage
            });