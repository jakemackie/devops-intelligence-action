name: DevOps Intelligence PR Review

on:
  workflow_call:
    secrets:
      OPENAI_API_KEY:
        required: true

permissions:
  contents: read
  pull-requests: write

            echo '<?xml version="1.0" encoding="UTF-8"?>
          # Ensure phpunit.xml exists
          - name: Ensure phpunit.xml exists
            run: |
              if [ ! -f phpunit.xml ]; then
                echo '<?xml version="1.0" encoding="UTF-8"?>
            const fs = require('fs');
            const review = fs.readFileSync('review.txt', 'utf8');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
          fi

      - name: Install PHPUnit
        run: composer require --dev phpunit/phpunit --with-all-dependencies
              fi

          - name: Install PHPUnit
            run: composer require --dev phpunit/phpunit --with-all-dependencies

          - name: Run PHPUnit with coverage
            run: |
              ./vendor/bin/phpunit --coverage-text > test-results.txt || true

          - name: Save generated tests for comment
            run: |
              if [ -f tests/Generated/AIGeneratedTest.php ]; then
                cp tests/Generated/AIGeneratedTest.php generated-test.txt
              else
                echo "No AI generated test file found." > generated-test.txt
              fi

          - name: Comment on PR
            uses: actions/github-script@v7
            with:
              script: |
                const fs = require('fs');
                const review = fs.readFileSync('review.txt', 'utf8');
                const tests = fs.readFileSync('generated-test.txt', 'utf8');
                const testResults = fs.readFileSync('test-results.txt', 'utf8');

                // Extract coverage percentage if present
                let coverage = '';
                const coverageMatch = testResults.match(/Lines:\s+(\d+\.\d+)%/);
                if (coverageMatch) {
                  coverage = coverageMatch[1] + '%';
                } else {
                  coverage = 'N/A';
                }

                github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body:
                    '### AI Code Review\n' + review +
                    '\n---\n' +
                    '### Tests Generated\n' +
                    '```php\n' + tests + '\n```' +
                    '\n---\n' +
                    '### Test Results\n' +
                    '```

                    '\n---\n' +
                    '### Coverage\n' +
                    coverage
                });
      - name: Run PHPUnit with coverage
        run: |
          ./vendor/bin/phpunit --coverage-text > test-results.txt || true

      - name: Save generated tests for comment
        run: |
          if [ -f tests/Generated/AIGeneratedTest.php ]; then
            cp tests/Generated/AIGeneratedTest.php generated-test.txt
          else
            echo "No AI generated test file found." > generated-test.txt
          fi
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "AI Code Review\n\n" + review
            });